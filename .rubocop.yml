---
AllCops:
  DisplayCopNames: true
  TargetRubyVersion: 2.3.3
  NewCops: enable
  SuggestExtensions: false
Metrics/AbcSize:
  Max: 50
Metrics/MethodLength:
  Max: 50
Metrics/BlockLength:
  Max: 30
Layout/EmptyLineAfterGuardClause:
  Enabled: false
Elegant/ClassInModule:
  Exclude:
    - 'lib/**/*'
    - '**/test_*.rb'
    - '**/*Test.rb'
Elegant/GoodVariableName:
  AllowedNames:
    - '@task_timeout'
    - '@shutdown_timeout'
plugins:
  - rubocop-rake
  - rubocop-minitest
  - rubocop-performance
  - rubocop-elegant
